<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Circle (Dark Machined Base) -->
  <circle cx="256" cy="256" r="240" fill="#121214" stroke="#333" stroke-width="2"/>
  
  <!-- Subtle Inner Ring (LED Track Style) -->
  <circle cx="256" cy="256" r="210" stroke="#3b82f6" stroke-width="4" stroke-dasharray="10 5" opacity="0.3"/>

  <!-- The "CLAW" Elements -->
  <g transform="translate(256, 256)">
    <!-- Top Claw Segment -->
    <path d="M-40 -180 C -10 -190, 10 -190, 40 -180 L 60 -100 L 0 -130 L -60 -100 Z" fill="url(#metal_grad)" stroke="#3b82f6" stroke-width="2"/>
    
    <!-- Right Claw Segment -->
    <g transform="rotate(120)">
      <path d="M-40 -180 C -10 -190, 10 -190, 40 -180 L 60 -100 L 0 -130 L -60 -100 Z" fill="url(#metal_grad)" stroke="#3b82f6" stroke-width="2"/>
    </g>
    
    <!-- Left Claw Segment -->
    <g transform="rotate(240)">
      <path d="M-40 -180 C -10 -190, 10 -190, 40 -180 L 60 -100 L 0 -130 L -60 -100 Z" fill="url(#metal_grad)" stroke="#3b82f6" stroke-width="2"/>
    </g>
  </g>

  <!-- Central DSP Pulse (Core Engine) -->
  <path d="M180 256 H220 L235 200 L275 312 L290 256 H332" stroke="#3b82f6" stroke-width="12" stroke-linecap="round" stroke-linejoin="round">
    <animate attributeName="stroke-opacity" values="1;0.4;1" dur="2s" repeatCount="indefinite" />
  </path>

  <!-- Gradients -->
  <defs>
    <linearGradient id="metal_grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#444;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#888;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#222;stop-opacity:1" />
    </linearGradient>
  </defs>
</svg>
