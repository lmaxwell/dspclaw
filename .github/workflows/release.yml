name: Build and Release

on:
  push:
    branches:
      - main
    tags:
      - 'v*'
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true # Global opt-in for Node 24

jobs:
  build_and_release:
    runs-on: macos-latest
    
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build Project (Web & Electron)
        run: |
          npm run build
          npx tsc -p electron/tsconfig.json || npx tsc
        env:
          ELECTRON: "true"

      - name: Package Electron App (macOS & Windows)
        run: npx electron-builder --mac x64 arm64 --win
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ELECTRON: "true"

      - name: Release
        uses: softprops/action-gh-release@v2
        if: startsWith(github.ref, 'refs/tags/')
        with:
          files: |
            release/*.zip
            release/*.dmg
            release/*.exe
          generate_release_notes: true

      - name: Deploy to Vercel (Production)
        uses: amondnet/vercel-action@v25
        if: startsWith(github.ref, 'refs/tags/')
        with:
          vercel-token: ${{ secrets.VERCEL_TOKEN }}
          vercel-org-id: ${{ secrets.VERCEL_ORG_ID}}
          vercel-project-id: ${{ secrets.VERCEL_PROJECT_ID}}
          vercel-args: '--prod'